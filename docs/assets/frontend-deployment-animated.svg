<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">StudyFlow frontend deployment and runtime architecture</title>
  <desc id="desc">Animated frontend CI/CD and browser runtime paths through GitHub Actions, EC2 Caddy, backend ALB, LiveKit and S3.</desc>
  <defs>
    <marker id="blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <marker id="purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#7c3aed"/></marker>
    <marker id="green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#16a34a"/></marker>
    <marker id="pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#db2777"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/></filter>
  </defs>
  <style>
    .title{font:800 34px Arial,sans-serif;fill:#172033}
    .sub{font:500 15px Arial,sans-serif;fill:#667085}
    .section{font:800 13px Arial,sans-serif;letter-spacing:1.2px;fill:#475467}
    .node-title{font:800 17px Arial,sans-serif;fill:#172033}
    .node-copy{font:600 12px Arial,sans-serif;fill:#667085}
    .tiny{font:700 11px Arial,sans-serif;fill:#475467}
    .deploy{fill:none;stroke:#7c3aed;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#purple);animation:dash 1.35s linear infinite}
    .page{fill:none;stroke:#2563eb;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#blue);animation:dash 1.25s linear infinite}
    .api{fill:none;stroke:#16a34a;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#green);animation:dash 1.55s linear infinite}
    .media{fill:none;stroke:#db2777;stroke-width:3;stroke-dasharray:10 9;marker-end:url(#pink);animation:dash 1.75s linear infinite}
    .pulse{animation:pulse 2.6s ease-in-out infinite;transform-origin:center}
    @keyframes dash{to{stroke-dashoffset:-38}}
    @keyframes pulse{0%,100%{opacity:.8}50%{opacity:1}}
  </style>

  <rect width="1400" height="850" fill="#f5f8fc"/>
  <rect x="28" y="24" width="1344" height="798" rx="10" fill="#fff" stroke="#d8dee9"/>
  <text x="64" y="76" class="title">StudyFlow Frontend Delivery &amp; Runtime</text>
  <text x="64" y="105" class="sub">Vite build artifacts are deployed to Caddy; browser traffic separates into API, realtime and media paths</text>

  <text x="64" y="150" class="section">CI/CD · MAIN BRANCH</text>
  <rect x="55" y="170" width="180" height="96" rx="8" fill="#f8fafc" stroke="#64748b" filter="url(#shadow)"/>
  <text x="145" y="208" text-anchor="middle" class="node-title">GitHub</text>
  <text x="145" y="233" text-anchor="middle" class="node-copy">main branch push</text>

  <rect x="300" y="150" width="240" height="136" rx="8" fill="#f5f3ff" stroke="#8b5cf6" filter="url(#shadow)"/>
  <text x="420" y="188" text-anchor="middle" class="node-title">GitHub Actions</text>
  <text x="420" y="213" text-anchor="middle" class="node-copy">Node.js 20 · npm ci</text>
  <text x="420" y="236" text-anchor="middle" class="node-copy">VITE_* build-time injection</text>
  <text x="420" y="259" text-anchor="middle" class="tiny">npm run build</text>

  <rect x="610" y="170" width="190" height="96" rx="8" fill="#eff6ff" stroke="#60a5fa" filter="url(#shadow)"/>
  <text x="705" y="208" text-anchor="middle" class="node-title">dist/</text>
  <text x="705" y="233" text-anchor="middle" class="node-copy">Static SPA assets</text>

  <g class="pulse">
    <rect x="880" y="145" width="250" height="146" rx="8" fill="#ecfdf3" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
    <text x="1005" y="184" text-anchor="middle" class="node-title">EC2-A · Caddy</text>
    <text x="1005" y="209" text-anchor="middle" class="node-copy">/home/ec2-user/studyflow/www</text>
    <text x="1005" y="232" text-anchor="middle" class="node-copy">HTTPS static hosting</text>
    <text x="1005" y="255" text-anchor="middle" class="tiny">SCP upload · no Node runtime</text>
  </g>

  <rect x="1190" y="170" width="155" height="96" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="1268" y="208" text-anchor="middle" class="node-title">DuckDNS</text>
  <text x="1268" y="233" text-anchor="middle" class="node-copy">Frontend domain</text>

  <path d="M235 218H300" class="deploy"/>
  <path d="M540 218H610" class="deploy"/>
  <path d="M800 218H880" class="deploy"/>
  <path d="M1130 218H1190" class="deploy"/>

  <text x="64" y="356" class="section">BROWSER RUNTIME</text>
  <rect x="55" y="380" width="220" height="122" rx="8" fill="#eff6ff" stroke="#3b82f6" filter="url(#shadow)"/>
  <text x="165" y="420" text-anchor="middle" class="node-title">User Browser</text>
  <text x="165" y="445" text-anchor="middle" class="node-copy">React SPA · HashRouter</text>
  <text x="165" y="468" text-anchor="middle" class="node-copy">Fetch · SockJS · LiveKit</text>
  <text x="165" y="490" text-anchor="middle" class="tiny">Access token in memory</text>

  <rect x="355" y="380" width="230" height="122" rx="8" fill="#ecfdf3" stroke="#34d399" filter="url(#shadow)"/>
  <text x="470" y="420" text-anchor="middle" class="node-title">Caddy Gateway</text>
  <text x="470" y="445" text-anchor="middle" class="node-copy">Frontend static response</text>
  <text x="470" y="468" text-anchor="middle" class="node-copy">API domain reverse proxy</text>
  <text x="470" y="490" text-anchor="middle" class="tiny">TLS termination</text>

  <rect x="665" y="380" width="190" height="122" rx="8" fill="#fffbeb" stroke="#f59e0b" filter="url(#shadow)"/>
  <text x="760" y="420" text-anchor="middle" class="node-title">AWS ALB</text>
  <text x="760" y="445" text-anchor="middle" class="node-copy">API / SSE / SockJS</text>
  <text x="760" y="468" text-anchor="middle" class="node-copy">EC2 health checks</text>
  <text x="760" y="490" text-anchor="middle" class="tiny">A/B load balancing</text>

  <rect x="935" y="350" width="260" height="184" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="960" y="382" class="section">BACKEND APP LAYER</text>
  <rect x="960" y="400" width="210" height="50" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="1065" y="431" text-anchor="middle" class="node-title">EC2-A · Spring Boot</text>
  <rect x="960" y="466" width="210" height="50" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="1065" y="497" text-anchor="middle" class="node-title">EC2-B · Spring Boot</text>

  <path d="M275 441H355" class="page"/>
  <path d="M585 441H665" class="api"/>
  <path d="M855 425H960" class="api"/>
  <path d="M855 465H960" class="api"/>
  <text x="288" y="428" class="tiny">HTTPS</text>
  <text x="598" y="428" class="tiny">REST / WSS</text>

  <text x="64" y="605" class="section">DIRECT BROWSER CONNECTIONS</text>
  <rect x="350" y="625" width="220" height="108" rx="8" fill="#fdf2f8" stroke="#f472b6" filter="url(#shadow)"/>
  <text x="460" y="665" text-anchor="middle" class="node-title">LiveKit Cloud</text>
  <text x="460" y="690" text-anchor="middle" class="node-copy">Camera · Microphone</text>
  <text x="460" y="712" text-anchor="middle" class="tiny">WebRTC SFU</text>

  <rect x="665" y="625" width="220" height="108" rx="8" fill="#f0fdf4" stroke="#4ade80" filter="url(#shadow)"/>
  <text x="775" y="665" text-anchor="middle" class="node-title">Amazon S3</text>
  <text x="775" y="690" text-anchor="middle" class="node-copy">Image · PDF · Audio</text>
  <text x="775" y="712" text-anchor="middle" class="tiny">Public object URL</text>

  <rect x="980" y="625" width="260" height="108" rx="8" fill="#fff7ed" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="1110" y="665" text-anchor="middle" class="node-title">Build-time public config</text>
  <text x="1110" y="690" text-anchor="middle" class="node-copy">API base · Kakao JS key</text>
  <text x="1110" y="712" text-anchor="middle" class="tiny">Never place server secrets in VITE_*</text>

  <path d="M165 502C165 590 400 570 460 625" class="media"/>
  <path d="M205 502C260 590 690 560 775 625" class="api"/>
  <path d="M1090 625C1000 580 515 555 275 474" class="deploy"/>

  <g fill="#7c3aed">
    <circle r="6"><animateMotion dur="2.2s" repeatCount="indefinite" path="M235 218H300"/></circle>
    <circle r="6"><animateMotion begin=".5s" dur="2.2s" repeatCount="indefinite" path="M540 218H610"/></circle>
    <circle r="6"><animateMotion begin="1s" dur="2.2s" repeatCount="indefinite" path="M800 218H880"/></circle>
  </g>
  <g fill="#16a34a">
    <circle r="6"><animateMotion dur="2.4s" repeatCount="indefinite" path="M585 441H665"/></circle>
    <circle r="6"><animateMotion begin=".6s" dur="2.2s" repeatCount="indefinite" path="M855 425H960"/></circle>
  </g>
  <g fill="#db2777">
    <circle r="6"><animateMotion dur="2.8s" repeatCount="indefinite" path="M165 502C165 590 400 570 460 625"/></circle>
  </g>

  <rect x="55" y="780" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="75" y="791" class="tiny">Build / deployment</text>
  <rect x="195" y="780" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="215" y="791" class="tiny">Static page</text>
  <rect x="300" y="780" width="12" height="12" rx="2" fill="#16a34a"/>
  <text x="320" y="791" class="tiny">API / data</text>
  <rect x="405" y="780" width="12" height="12" rx="2" fill="#db2777"/>
  <text x="425" y="791" class="tiny">WebRTC media</text>
  <text x="1340" y="791" text-anchor="end" class="sub">The production frontend is a static bundle served by Caddy</text>
</svg>
